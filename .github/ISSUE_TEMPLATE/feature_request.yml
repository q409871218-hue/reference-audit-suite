name: ✨ 功能请求
description: 建议新的审计 Skill 或功能改进
title: "[Feature] "
labels: ["enhancement"]
assignees: []

body:
- type: markdown
  attributes:
    value: |
      ## 功能描述
      清晰描述你希望添加的功能。

- type: textarea
  id: problem
  attributes:
    label: 要解决的问题
    description: 这个功能要解决什么问题？
  validations:
    required: true

- type: textarea
  id: solution
  attributes:
    label: 建议的解决方案
    description: 你希望如何实现？
  validations:
    required: true

- type: textarea
  id: alternatives
  attributes:
    label: 替代方案
    description: 是否考虑过其他方案？

- type: checkboxes
  id: checklist
  attributes:
    label: 检查清单
    options:
      - label: 这个功能与本套件主题相关（参考文献审计）
      - label: 我已在 Issue 中搜索类似请求
